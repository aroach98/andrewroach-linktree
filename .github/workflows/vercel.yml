name: Vercel Deploy

# All Vercel deploys for this repo run here, not through Vercel's Git integration
# (vercel.json sets git.deploymentEnabled: false). The deploy authenticates as the
# token owner rather than as the commit author, so commits authored as aroach98 --
# whose GitHub is linked to a DIFFERENT (CACC) Vercel account -- are not seat-blocked.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    # The default GITHUB_TOKEN is read-only; commenting the preview URL needs write.
    permissions:
      contents: read
      pull-requests: write
    env:
      VERCEL_ORG_ID: team_TwtHoN667y5r0uFskmaajSUK
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      REAL_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      # Pinned on purpose -- do not float back to `latest`. An upstream CLI release
      # can break production deploys with no commit involved (56.3.0 did across CACC).
      # Bump deliberately in a PR so a preview build proves the new version first.
      VERCEL_CLI_VERSION: '56.3.1'
    steps:
      # Without an explicit project id the Vercel CLI does not fail -- it CREATES a
      # new project and deploys there, silently. Fail loudly instead.
      - name: Require VERCEL_PROJECT_ID
        run: |
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::error::Repo variable VERCEL_PROJECT_ID is unset. Set it with:"
            echo "::error::  gh variable set VERCEL_PROJECT_ID --repo ${{ github.repository }} --body prj_xxx"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2

      # Vercel refuses to deploy a commit whose author lacks team access, and enforces
      # this even for token-authenticated CLI deploys. Re-authoring HEAD inside the
      # runner clears the check. This rewrites the commit in the ephemeral checkout
      # only -- the real repository history is never touched or pushed, so commits keep
      # aroach98 authorship. Side effect: the SHA changes, so the true commit is passed
      # as --meta gitSha.
      #
      # The email MUST be one Vercel can resolve to a member of THIS team
      # (andrew-projects3). Use the account owner's own Vercel email -- NOT aroach98's
      # github.com noreply address, which Vercel maps to no member here: aroach98's
      # GitHub is linked to the CACC Vercel account, not this one, so a github noreply
      # would block production with TEAM_ACCESS_REQUIRED. Previews are not seat-checked,
      # so a wrong email fails ONLY on main -- a green PR proves nothing about it.
      - name: Re-author HEAD for Vercel's git-author check
        run: |
          git -c user.name='aroach98' \
              -c user.email='dakeragamer13@gmail.com' \
              commit --amend --no-edit --reset-author --allow-empty

      - name: Install Vercel CLI
        run: npm install --global "vercel@$VERCEL_CLI_VERSION"

      - name: Deploy
        id: deploy
        run: |
          set -euo pipefail
          args="--yes --archive=tgz --token=$VERCEL_TOKEN --meta gitSha=$REAL_SHA"
          # pull_request => preview. push and workflow_dispatch are both main => prod.
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            args="$args --prod"
          fi
          # --no-wait returns as soon as the deployment exists; the verdict comes from
          # the API poll below, not from holding this HTTP connection open.
          url=$(vercel deploy $args --no-wait)
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Created deployment: $url"

      # The build runs on Vercel whether or not this runner watches, so the verdict
      # comes from the deployment's real state -- never from our connection to it.
      - name: Wait for the build and report its real state
        env:
          URL: ${{ steps.deploy.outputs.url }}
        run: |
          set -uo pipefail
          host="${URL#https://}"
          deadline=$(( SECONDS + 1200 ))
          misses=0
          state=""
          while [ "$SECONDS" -lt "$deadline" ]; do
            body=$(curl -sS --max-time 30 \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v13/deployments/$host?teamId=$VERCEL_ORG_ID") || body=""
            state=$(printf '%s' "$body" | jq -r '.readyState // empty' 2>/dev/null)
            if [ -z "$state" ]; then
              misses=$(( misses + 1 ))
              if [ "$misses" -ge 20 ]; then
                echo "::error::Could not read the deployment state $misses times. The"
                echo "::error::build may have succeeded -- check $URL before re-running."
                exit 1
              fi
              sleep 10
              continue
            fi
            misses=0
            case "$state" in
              READY)
                echo "Deployment READY: $URL"
                exit 0
                ;;
              ERROR|CANCELED)
                echo "::error::Deployment $state. Build logs: $URL"
                exit 1
                ;;
            esac
            echo "  $state ..."
            sleep 10
          done
          echo "::error::Still '$state' after 20 minutes: $URL"
          exit 1

      - name: Comment preview URL on the PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const marker = '<!-- vercel-preview -->';
            const body = `${marker}\n**Preview:** ${url}\n\n<sub>Deployed from \`${process.env.REAL_SHA.slice(0,7)}\` by GitHub Actions.</sub>`;
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });
            }
